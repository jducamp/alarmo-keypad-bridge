blueprint:
  name: Alarmo ↔ Zigbee2MQTT Keypad Sync
  description: >
    Asynchronous, native bidirectional bridge between Alarmo and a Zigbee keypad (e.g., KEYZB-110).
    Handles hardware acknowledgments (ACK) and state synchronization without blocking execution.
  domain: automation
  input:
    alarmo_entity:
      name: Alarmo Entity
      description: The Alarmo control panel entity to synchronize.
      selector:
        entity:
          domain: alarm_control_panel
    mqtt_topic:
      name: Keypad MQTT Topic
      description: "The base topic defined in Zigbee2MQTT (e.g., zigbee2mqtt/Keypad). Do not include the trailing /set."
      selector:
        text: {}

mode: parallel
max: 10

trigger:
  - trigger: mqtt
    topic: !input mqtt_topic
    id: keypad_request

  - trigger: state
    entity_id: !input alarmo_entity
    id: alarmo_state

variables:
  panel_entity: !input alarmo_entity
  base_topic: !input mqtt_topic
  keypad_topic: "{{ base_topic }}/set"
  
  # Mapping: System State -> Keypad Display
  state_to_keypad:
    disarmed: disarm
    armed_away: arm_all_zones
    armed_home: arm_day_zones
    armed_night: arm_night_zones
    triggered: in_alarm
    arming: exit_delay
    pending: entry_delay
    
  # Mapping: Keypad Action -> System Command
  keypad_to_alarmo_mode:
    arm_all_zones: away
    arm_day_zones: home
    arm_night_zones: night

action:
  - choose:
      # ───────────────────────────────────────────────
      # FLOW 1: HARDWARE REQUEST (Keypad -> Alarmo)
      # ───────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: keypad_request
          - condition: template
            value_template: "{{ trigger.payload_json.action_transaction is not none }}"
          - condition: template
            value_template: >
              {{ trigger.payload_json.action in ['arm_all_zones','arm_day_zones','arm_night_zones','disarm'] }}
        sequence:
          - variables:
              req_action: "{{ trigger.payload_json.action }}"
              req_code: "{{ trigger.payload_json.action_code | default('') }}"
              req_tx: "{{ trigger.payload_json.action_transaction }}"

          # Forwarding command to Alarmo
          - choose:
              - conditions: "{{ req_action == 'disarm' }}"
                sequence:
                  - action: alarmo.disarm
                    target:
                      entity_id: "{{ panel_entity }}"
                    data:
                      code: "{{ req_code }}"
              - conditions: "{{ req_action in keypad_to_alarmo_mode.keys() }}"
                sequence:
                  - action: alarmo.arm
                    target:
                      entity_id: "{{ panel_entity }}"
                    data:
                      mode: "{{ keypad_to_alarmo_mode[req_action] }}"
                      code: "{{ req_code }}"

          # Ultra-short wait for Alarmo's immediate acknowledgment
          - alias: "Wait for action result"
            wait_for_trigger:
              - trigger: event
                event_type: alarmo_failed_to_arm
                id: ko
              - trigger: state
                entity_id: !input alarmo_entity
                to:
                  - arming
                  - armed_away
                  - armed_home
                  - armed_night
                  - disarmed
                id: ok
            timeout: "00:00:10"
            continue_on_timeout: true

          # Strict response handling (Hardware ACK with Transaction ID)
          - variables:
              outcome_id: "{{ wait.trigger.id if wait.trigger is defined else 'timeout' }}"
              ack_mode: >-
                {% if outcome_id == 'ok' %}{{ req_action }}
                {%- elif outcome_id == 'ko' %}not_ready
                {%- else %}invalid_code{% endif %}

          - action: mqtt.publish
            data:
              topic: "{{ keypad_topic }}"
              qos: 1
              payload: >-
                {{ {'arm_mode': {'transaction': req_tx, 'mode': ack_mode}} | tojson }}

      # ───────────────────────────────────────────────
      # FLOW 2: SYNCHRONIZATION (Alarmo -> Keypad)
      # ───────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: alarmo_state
          - condition: template
            value_template: "{{ trigger.to_state.state in state_to_keypad.keys() }}"
          # Anti-spam safeguard: verify the state actually changed
          - condition: template
            value_template: >
              {{ trigger.from_state is not none and trigger.from_state.state != trigger.to_state.state }}
        sequence:
          - action: mqtt.publish
            data:
              topic: "{{ keypad_topic }}"
              qos: 1
              payload: >-
                {{ {'arm_mode': {'mode': state_to_keypad[trigger.to_state.state]}} | tojson }}
